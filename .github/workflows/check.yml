name: Check

on:
  push:
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

  manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate release config and workflows
        run: ruby -e 'require "yaml"; YAML.load_file(".releaserc.yml"); Dir[".github/workflows/*.yml"].sort.each { |path| YAML.load_file(path) }'
      - name: Validate package manifests
        run: |
          node <<'NODE'
          const fs = require("fs");
          const manifests = [
            "package.json",
            "Packages/com.nekometer.esnya.inari-udon/package.json",
          ];
          for (const path of manifests) {
            JSON.parse(fs.readFileSync(path, "utf8"));
          }
          NODE

  udonsharp-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            6.0.x
      - name: Restore dotnet tools
        run: dotnet tool restore
      - name: Run UdonSharp Linter
        run: dotnet tool run udonsharp-lint Packages/com.nekometer.esnya.inari-udon
